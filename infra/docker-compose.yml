services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.33.0
    container_name: regulatory-intake-azurite
    restart: unless-stopped
    command: >
      azurite
      --blobHost 0.0.0.0
      --queueHost 0.0.0.0
      --tableHost 0.0.0.0
      --location /data
      --debug /data/debug.log
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - ./azurite:/data
